<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adivinhe o Número</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-warning sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3 text-warning" href="index.html">
                <i class="bi bi-dice-6-fill"></i> RPG GAMES
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            <i class="bi bi-dice-6"></i> D20 Rolador
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active text-info fw-bold" href="adivinha.html">
                            <i class="bi bi-target"></i> Adivinhe o Número
                        </a>
                    </li>

                    <li class="nav-item ms-3">
                        <a href="index.html" class="btn btn-outline-warning btn-sm">
                            <i class="bi bi-arrow-left"></i> Voltar aos Dados
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4">
                    <div class="card-body text-center">
                        <h2 class="mb-4 text-primary">🎲 Adivinhe o Número</h2>
                        <p class="text-muted mb-4">O número está entre <strong>0 e 10</strong></p>

                        <div class="mb-4">
                            <input type="number" id="palpite" class="form-control form-control-lg text-center"
                                placeholder="Digite seu palpite" min="0" max="10" autofocus>
                        </div>

                        <button id="btnAdivinhar" class="btn btn-primary btn-lg w-100 mb-3">
                            Adivinhar
                        </button>

                        <div id="mensagem" class="mt-3 fw-bold fs-5"></div>

                        <div class="mt-4">
                            <p class="tentativas text-muted">
                                Tentativas restantes: <span id="tentativas" class="text-danger">2</span>
                            </p>
                        </div>

                        <button id="btnReiniciar" class="btn btn-outline-secondary mt-3 d-none">
                            Jogar Novamente
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="text-center py-4 text-white-50 small">
        Feito com ❤️ para jogadores de RPG • João Marcos
    </footer>

    <script src="js/script2.js"></script>
</body>

</html>
