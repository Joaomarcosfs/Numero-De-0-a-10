<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adivinhe o Número</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4">
                    <div class="card-body text-center">
                        <h2 class="mb-4 text-primary">🎲 Adivinhe o Número</h2>
                        <p class="text-muted mb-4">O número está entre <strong>0 e 10</strong></p>

                        <div class="mb-4">
                            <input type="number" id="palpite" class="form-control form-control-lg text-center"
                                placeholder="Digite seu palpite" min="0" max="10" autofocus>
                        </div>

                        <button id="btnAdivinhar" class="btn btn-primary btn-lg w-100 mb-3">
                            Adivinhar
                        </button>

                        <div id="mensagem" class="mt-3 fw-bold fs-5"></div>

                        <div class="mt-4">
                            <p class="tentativas text-muted">
                                Tentativas restantes: <span id="tentativas" class="text-danger">2</span>
                            </p>
                        </div>

                        <button id="btnReiniciar" class="btn btn-outline-secondary mt-3 d-none">
                            Jogar Novamente
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script2.js"></script>
</body>

</html>
